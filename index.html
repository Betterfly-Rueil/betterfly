<head>

  <title>BETTERFLY Festival — 13 Juin 2026 · Rueil-Malmaison</title>
  <meta name="description" content="Festival électro/pop solidaire contre le HPV. 13 juin 2026 au Parc des Bords de Seine." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-violet: #bf00ff; --neon-pink: #e8197a; --neon-blue: #00c8ff; --neon-lime: #c6ff00;
      --bg-dark: #05040e; --bg-mid: #0a0818; --bg-card: #110f22; --text-main: #f0ecff; --text-muted: #8a7faa;
      --border: rgba(191,0,255,0.18); --glow-p: 0 0 30px rgba(232,25,122,0.45); --glow-b: 0 0 30px rgba(0,200,255,0.35);
      --font-display: 'Bebas Neue', sans-serif; --font-mono: 'Space Mono', monospace; --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg-dark); color: var(--text-main); font-family: var(--font-body); font-weight: 300; line-height: 1.7; overflow-x: hidden; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 5vw; }
    
    /* NAV */
    #nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 5vw; height: 72px; transition: 0.4s; }
    #nav.scrolled { background: rgba(5,4,14,0.9); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); }
    .nav-logo img { height: 38px; filter: drop-shadow(0 0 10px var(--neon-pink)); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); }
    .nav-links a:hover { color: var(--neon-pink); }
    .nav-cta { background: linear-gradient(135deg, var(--neon-violet), var(--neon-pink)); padding: 0.5rem 1.2rem; border-radius: 100px; color: #fff !important; font-size: 0.7rem !important; }

    /* HERO */
    #hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; padding: 120px 5vw; }
    .hero-logo-img { height: clamp(100px, 20vw, 200px); margin-bottom: 1.5rem; filter: drop-shadow(0 0 20px var(--neon-pink)); animation: logoPulse 3s infinite alternate; }
    @keyframes logoPulse { from { transform: scale(1); filter: drop-shadow(0 0 20px var(--neon-pink)); } to { transform: scale(1.05); filter: drop-shadow(0 0 40px var(--neon-violet)); } }
    .section-title { font-family: var(--font-display); font-size: clamp(3rem, 8vw, 6rem); line-height: 0.9; margin-bottom: 1.5rem; }
    .grad-text { background: linear-gradient(90deg, var(--neon-violet), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* TICKETS */
    .ticket-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
    .ticket-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; text-align: center; transition: 0.3s; position: relative; }
    .ticket-card:hover { transform: translateY(-10px); border-color: var(--neon-pink); }
    .ticket-card.featured { border: 2px solid var(--neon-pink); box-shadow: var(--glow-p); }
    .badge-date { font-family: var(--font-mono); font-size: 0.6rem; color: var(--neon-lime); border: 1px solid var(--neon-lime); padding: 2px 10px; border-radius: 20px; margin-bottom: 1rem; display: inline-block; }
    .price { font-family: var(--font-display); font-size: 3.5rem; margin: 0.5rem 0; }
    .ticket-perks { list-style: none; margin: 1.5rem 0; font-size: 0.85rem; color: var(--text-muted); text-align: left; }

    /* LINEUP */
    .program-item { background: var(--bg-card); margin-bottom: 1rem; padding: 1.5rem; border-radius: 15px; display: flex; align-items: center; gap: 2rem; border: 1px solid var(--border); }
    .program-time { font-family: var(--font-mono); color: var(--neon-blue); min-width: 100px; }
    
    /* REVEAL */
    .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) { .nav-links { display: none; } .program-item { flex-direction: column; align-items: flex-start; gap: 0.5rem; } }
  </style>
</head>

<script>
  /* Menu Mobile */
  const navEl = document.getElementById('nav');
  window.addEventListener('scroll', () => { navEl.classList.toggle('scrolled', window.scrollY > 50); });

  /* Countdown */
  function updateCountdown() {
    const target = new Date('2026-06-13T15:30:00').getTime();
    const now = new Date().getTime();
    const diff = target - now;
    if (diff > 0) {
      document.getElementById('cd-days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
      document.getElementById('cd-hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
      document.getElementById('cd-mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
      document.getElementById('cd-secs').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
    }
  }
  setInterval(updateCountdown, 1000);
  updateCountdown();

  /* Intersection Observer for reveal */
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
